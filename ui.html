<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>🔮 Astrologer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Crimson Text', Georgia, serif;
      background: #07071a;
      color: #e8e0f0;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    /* Starfield */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        radial-gradient(1px 1px at 10% 15%, rgba(255,255,255,0.6) 0%, transparent 100%),
        radial-gradient(1px 1px at 25% 40%, rgba(255,255,255,0.4) 0%, transparent 100%),
        radial-gradient(1px 1px at 40% 8%,  rgba(255,255,255,0.5) 0%, transparent 100%),
        radial-gradient(1px 1px at 55% 65%, rgba(255,255,255,0.3) 0%, transparent 100%),
        radial-gradient(1px 1px at 70% 20%, rgba(255,255,255,0.6) 0%, transparent 100%),
        radial-gradient(1px 1px at 80% 50%, rgba(255,255,255,0.4) 0%, transparent 100%),
        radial-gradient(1px 1px at 90% 30%, rgba(255,255,255,0.5) 0%, transparent 100%),
        radial-gradient(1px 1px at 15% 75%, rgba(255,255,255,0.3) 0%, transparent 100%),
        radial-gradient(1px 1px at 35% 90%, rgba(255,255,255,0.4) 0%, transparent 100%),
        radial-gradient(1px 1px at 60% 85%, rgba(255,255,255,0.5) 0%, transparent 100%),
        radial-gradient(1px 1px at 75% 95%, rgba(255,255,255,0.3) 0%, transparent 100%),
        radial-gradient(1.5px 1.5px at 5%  55%, rgba(200,180,255,0.5) 0%, transparent 100%),
        radial-gradient(1.5px 1.5px at 48% 30%, rgba(200,180,255,0.4) 0%, transparent 100%),
        radial-gradient(1.5px 1.5px at 85% 10%, rgba(200,180,255,0.5) 0%, transparent 100%),
        radial-gradient(2px 2px at 20% 5%,  rgba(212,175,55,0.5) 0%, transparent 100%),
        radial-gradient(2px 2px at 65% 45%, rgba(212,175,55,0.4) 0%, transparent 100%),
        radial-gradient(2px 2px at 92% 70%, rgba(212,175,55,0.5) 0%, transparent 100%);
      pointer-events: none;
      z-index: 0;
    }

    header {
      position: relative;
      z-index: 1;
      padding: 14px 24px;
      background: linear-gradient(180deg, #0d0d2e 0%, #0a0a20 100%);
      border-bottom: 1px solid #2a1f5a;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    header .title {
      font-family: 'Cinzel', serif;
      font-size: 18px;
      font-weight: 600;
      color: #d4af37;
      letter-spacing: 0.08em;
    }
    header .sep { color: #3a2f6a; }
    header #status {
      font-family: 'Crimson Text', serif;
      font-size: 13px;
      font-style: italic;
      color: #7a6a9a;
    }
    header #run-id {
      margin-left: auto;
      font-size: 11px;
      color: #7a6a9a;
      font-family: monospace;
      letter-spacing: 0.05em;
      user-select: all;
    }

    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 28px 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      position: relative;
      z-index: 1;
    }

    #chat::-webkit-scrollbar { width: 4px; }
    #chat::-webkit-scrollbar-track { background: transparent; }
    #chat::-webkit-scrollbar-thumb { background: #2a1f5a; border-radius: 2px; }

    .msg {
      max-width: 75%;
      padding: 12px 18px;
      border-radius: 16px;
      line-height: 1.7;
      font-size: 16px;
    }

    /* Markdown inside assistant */
    .msg.assistant h1, .msg.assistant h2, .msg.assistant h3 {
      font-family: 'Cinzel', serif;
      color: #d4af37;
      margin: 12px 0 6px;
      font-size: 1em;
      letter-spacing: 0.05em;
    }
    .msg.assistant h1 { font-size: 1.15em; }
    .msg.assistant p { margin: 6px 0; }
    .msg.assistant ul, .msg.assistant ol { padding-left: 20px; margin: 6px 0; }
    .msg.assistant li { margin: 3px 0; }
    .msg.assistant strong { color: #d4af37; font-weight: 600; }
    .msg.assistant em { color: #c4a8e0; }
    .msg.assistant hr { border: none; border-top: 1px solid #2a1f5a; margin: 12px 0; }
    .msg.assistant table { border-collapse: collapse; width: 100%; margin: 10px 0; font-size: 14px; }
    .msg.assistant th { background: #1a1040; color: #d4af37; padding: 6px 10px; text-align: left; font-family: 'Cinzel', serif; font-size: 0.85em; }
    .msg.assistant td { padding: 5px 10px; border-top: 1px solid #2a1f5a; }
    .msg.assistant code { background: #1a1040; padding: 1px 5px; border-radius: 3px; font-size: 13px; color: #c4a8e0; }

    .msg.assistant {
      background: linear-gradient(135deg, #0f0d2a 0%, #130f35 100%);
      border: 1px solid #2a1f5a;
      align-self: flex-start;
      border-radius: 4px 16px 16px 16px;
      box-shadow: 0 2px 12px rgba(80,40,160,0.15);
    }
    .msg.user {
      background: linear-gradient(135deg, #2d1b6e 0%, #3b1f85 100%);
      border: 1px solid #5a3fa0;
      color: #e8e0f0;
      align-self: flex-end;
      border-radius: 16px 4px 16px 16px;
      box-shadow: 0 2px 12px rgba(80,40,160,0.2);
    }
    .msg.system {
      background: transparent;
      color: #3a2f6a;
      font-size: 12px;
      font-style: italic;
      align-self: center;
      border: none;
      padding: 0;
    }
    .msg.error {
      background: #1a0a1a;
      border: 1px solid #6a1f3a;
      color: #e08080;
      align-self: flex-start;
      border-radius: 4px 16px 16px 16px;
    }

    .files {
      align-self: flex-start;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 4px;
    }
    .files a {
      display: inline-block;
      padding: 5px 14px;
      background: #0f0d2a;
      border: 1px solid #d4af37;
      border-radius: 20px;
      color: #d4af37;
      font-family: 'Cinzel', serif;
      font-size: 12px;
      text-decoration: none;
      letter-spacing: 0.04em;
      transition: background 0.2s;
    }
    .files a:hover { background: #1a1540; }

    #footer {
      position: relative;
      z-index: 1;
      padding: 14px 24px;
      background: linear-gradient(0deg, #0d0d2e 0%, #0a0a20 100%);
      border-top: 1px solid #2a1f5a;
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }

    #input {
      flex: 1;
      background: #0a0820;
      border: 1px solid #2a1f5a;
      border-radius: 12px;
      padding: 10px 16px;
      color: #e8e0f0;
      font-family: 'Crimson Text', serif;
      font-size: 16px;
      outline: none;
      resize: none;
      height: 44px;
      line-height: 1.5;
      transition: border-color 0.2s;
    }
    #input::placeholder { color: #3a2f6a; }
    #input:focus { border-color: #d4af37; box-shadow: 0 0 8px rgba(212,175,55,0.15); }
    #input:disabled { opacity: 0.3; cursor: not-allowed; }
    #input::-webkit-scrollbar { display: none; }
    #input { scrollbar-width: none; }

    #send {
      padding: 0 20px;
      height: 44px;
      background: linear-gradient(135deg, #8b6914 0%, #c9950a 100%);
      border: none;
      border-radius: 12px;
      color: #0a0820;
      font-family: 'Cinzel', serif;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.06em;
      cursor: pointer;
      white-space: nowrap;
      transition: opacity 0.2s;
    }
    #send:hover { opacity: 0.9; }
    #send:disabled { background: #1a1540; color: #3a2f6a; cursor: not-allowed; }

    .typing {
      align-self: flex-start;
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 10px 16px;
      background: linear-gradient(135deg, #0f0d2a 0%, #130f35 100%);
      border: 1px solid #2a1f5a;
      border-radius: 4px 16px 16px 16px;
    }
    .typing span {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: #d4af37;
      opacity: 0.3;
      animation: pulse 1.4s infinite ease-in-out;
    }
    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes pulse { 0%,80%,100% { opacity: 0.2; transform: scale(0.8); } 40% { opacity: 1; transform: scale(1.2); } }

    /* Zodiac floaters */
    #zodiac-bg {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }
    .zodiac-symbol {
      position: absolute;
      font-size: 28px;
      font-family: 'Cinzel', serif;
      color: rgba(212,175,55,0.12);
      animation: floatZ linear infinite;
      user-select: none;
      font-variant-emoji: text;
    }
    @keyframes floatZ {
      0%   { transform: translateY(110vh) rotate(0deg);   opacity: 0; }
      5%   { opacity: 1; }
      95%  { opacity: 1; }
      100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
    }
  </style>
</head>
<body>

<div id="zodiac-bg"></div>

<header>
  <span class="title">🔮 Astrologer</span>
  <span class="sep">·</span>
  <span id="status">ready</span>
  <span id="run-id"></span>
</header>

<div id="chat">
  <div class="msg assistant" id="intro">
    <p>✦ &nbsp;Welcome, seeker.</p>
    <p>I am your personal astrologer — I read the celestial map of your birth to reveal the forces that shape your path.</p>
    <p>Tell me your <strong>birth date, time, and place</strong>, and I shall unveil your signs, your ruling planets, and the rituals aligned with your destiny.</p>
  </div>
</div>

<div id="footer">
  <textarea id="input" placeholder="Ask the stars…" rows="1"></textarea>
  <button id="send">Consult</button>
</div>

<script>
const API = 'http://localhost:8000';

let runId = null;
let es = null;
let isIdle = false;

const chat    = document.getElementById('chat');
const input   = document.getElementById('input');
const send    = document.getElementById('send');
const status  = document.getElementById('status');
const runIdEl = document.getElementById('run-id');

marked.setOptions({ breaks: true });

function setStatus(s, color = '#7a6a9a') {
  status.textContent = s;
  status.style.color = color;
}

function addMsg(cls, text) {
  if (!text.trim()) return null;
  const el = document.createElement('div');
  el.className = `msg ${cls}`;
  if (cls === 'assistant') {
    el.innerHTML = marked.parse(text);
  } else {
    el.textContent = text;
  }
  chat.appendChild(el);
  chat.scrollTop = chat.scrollHeight;
  return el;
}

function showFiles(files) {
  if (!files || !files.length) return;
  const el = document.createElement('div');
  el.className = 'files';
  files.forEach(f => {
    const a = document.createElement('a');
    a.href = `${API}/sessions/${runId}/files/${f}`;
    a.target = '_blank';
    a.textContent = '✦ ' + f;
    el.appendChild(a);
  });
  chat.appendChild(el);
  chat.scrollTop = chat.scrollHeight;
}

let typingEl = null;
function showTyping() {
  if (typingEl) return;
  typingEl = document.createElement('div');
  typingEl.className = 'typing';
  typingEl.innerHTML = '<span></span><span></span><span></span>';
  chat.appendChild(typingEl);
  chat.scrollTop = chat.scrollHeight;
}
function hideTyping() {
  if (typingEl) { typingEl.remove(); typingEl = null; }
}

function setIdle(idle) {
  isIdle = idle;
  input.disabled = !idle;
  send.disabled = !idle;
  if (idle) {
    input.focus();
    setStatus('awaiting your question', '#7c9f6e');
  }
}

function openStream() {
  es = new EventSource(`${API}/sessions/${runId}/stream`);

  es.onmessage = (e) => {
    const msg = JSON.parse(e.data);

    if (msg.type === 'assistant' && msg.text) {
      hideTyping();
      addMsg('assistant', msg.text);
      showTyping(); // keep indicator until idle
    } else if (msg.type === 'idle') {
      hideTyping();
      if (msg.files && msg.files.length) showFiles(msg.files);
      setIdle(true);
    } else if (msg.type === 'result') {
      // ignore
    } else if (msg.type === 'timeout') {
      hideTyping();
      addMsg('error', msg.message || 'The vision faded… session timed out.');
      setStatus('timed out', '#e08080');
      setIdle(false);
      es.close();
    } else if (msg.type === 'error') {
      hideTyping();
      addMsg('error', msg.message || 'The stars are silent. An error occurred.');
      setStatus('error', '#e08080');
      setIdle(false);
      es.close();
    } else if (msg.type === 'ping') {
      // keep-alive
    }
  };

  es.onerror = () => {
    if (status.textContent !== 'done') {
      setStatus('connection lost', '#e08080');
    }
    es.close();
  };
}

async function startSession(prompt) {
  setStatus('consulting the heavens…', '#d4af37');
  setIdle(false);
  showTyping();

  const res = await fetch(`${API}/sessions`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ prompt }),
  });
  const data = await res.json();
  runId = data.run_id;
  runIdEl.textContent = runId;
  setStatus('the stars are speaking…', '#d4af37');
  openStream();
}

async function sendInput(message) {
  setIdle(false);
  showTyping();
  await fetch(`${API}/sessions/${runId}/input`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ message }),
  });
}

function submit() {
  const text = input.value.trim();
  if (!text) return;
  input.value = '';

  addMsg('user', text);

  if (!runId) {
    startSession(text);
  } else if (isIdle) {
    sendInput(text);
  }
}

send.addEventListener('click', submit);
input.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    submit();
  }
});

// Zodiac background animation
(function() {
  // \uFE0E forces text presentation (no color emoji)
  const signs = ['♈\uFE0E','♉\uFE0E','♊\uFE0E','♋\uFE0E','♌\uFE0E','♍\uFE0E','♎\uFE0E','♏\uFE0E','♐\uFE0E','♑\uFE0E','♒\uFE0E','♓\uFE0E'];
  const bg = document.getElementById('zodiac-bg');
  function spawnSymbol() {
    const el = document.createElement('div');
    el.className = 'zodiac-symbol';
    el.textContent = signs[Math.floor(Math.random() * signs.length)];
    const size = 20 + Math.random() * 24;
    const dur  = 18 + Math.random() * 24;
    const left = Math.random() * 100;
    el.style.cssText = `font-size:${size}px; left:${left}%; animation-duration:${dur}s; animation-delay:${Math.random() * -dur}s;`;
    bg.appendChild(el);
    el.addEventListener('animationiteration', () => {
      el.style.left = Math.random() * 100 + '%';
    });
  }
  for (let i = 0; i < 18; i++) spawnSymbol();
})();

setIdle(true);
setStatus('ready — the cosmos awaits', '#7c9f6e');
</script>
</body>
</html>
